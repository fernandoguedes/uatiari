name: Release Build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality-gates:
    name: Quality gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run quality gates
        run: ./scripts/quality-gates.sh

  build:
    name: Build ${{ matrix.asset_name }}
    needs: quality-gates
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_name: uatiari-linux-x64
          - runner: macos-15
            goos: darwin
            goarch: amd64
            asset_name: uatiari-macos-x64
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            asset_name: uatiari-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist/uatiari
          go build -trimpath -ldflags="-s -w" -o dist/uatiari/uatiari ./cmd/uatiari

      - name: Get version
        run: |
          VERSION=$(awk -F '"' '/Version[[:space:]]*=/ { print $2; exit }' internal/version/version.go)
          echo "VERSION=v$VERSION" >> "$GITHUB_ENV"

      - name: Compress binary
        run: |
          cd dist
          tar -czf "${{ matrix.asset_name }}.tar.gz" uatiari

      - name: Upload binaries to Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: dist/${{ matrix.asset_name }}.tar.gz
          tag_name: ${{ env.VERSION }}
